<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>MyFashionPortfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/fashion-svgrepo-com.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>
<body>
    <section class="page1">
        <img src="img/back1.png" alt="Cover">
        <img class="needleThread" src="img/needle-and-thread-svgrepo-com.svg" alt="" aria-hidden="true">
    </section>

    <section class="page2">
        <img src="img/back2.png" alt="Cover">
    </section>

    <section class="page3">
        <img src="img/back3.png" alt="Cover">
        <svg class="stitchLine" aria-hidden="true" viewBox="0 0 60 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
            <path class="stitchPath"
                  d="M 30 130
                     Q 50 170, 30 210
                     Q 10 250, 30 290
                     Q 50 330, 30 370
                     Q 10 410, 30 450
                     Q 50 490, 30 530
                     Q 10 570, 30 610
                     Q 50 650, 30 690
                     Q 10 730, 30 770
                     Q 50 790, 30 796"
                  fill="none" stroke="#c77d9c" stroke-width="3"
                  stroke-linecap="round" stroke-dasharray="10 8"/>
            <g class="stitchNeedle">
                <line x1="30" y1="90" x2="30" y2="145" stroke="#5c2f45" stroke-width="4" stroke-linecap="round"/>
                <ellipse cx="30" cy="90" rx="4.5" ry="9" fill="none" stroke="#5c2f45" stroke-width="3.5"/>
            </g>
        </svg>
    </section>

    <section class="page4">
        <img src="img/back4.png" alt="Cover">
    </section>

    <section class="page5">
        <img src="img/back5.png" alt="Cover">
    </section>

    <section class="last-Page-Email">
        <img src="img/backEmail-Info.jpg" alt="Cover" class="last-Image">
        <div class="email-me">
            <form class="contact-form" action="https://formsubmit.co/marialena.zafeiriou@gmail.com" method="POST">
                <label>
                    <input type="text" name="name" placeholder="Your Name" required>
                </label>

                <label>
                    <input type="email" name="email" placeholder="Your Email" required>
                </label>

                <label>
                    <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
                </label>
                <button type="submit">E-mail me now!</button>
            </form>
        </div>
        <div class="contact-me-container">
            <fieldset class="contact-me-fieldset">
                <legend class="contact-me-legend">Contact me on Social</legend>
                <a href="https://linkedin.com/in/TO_PROFILE_SOU" target="_blank" title="LinkedIn">
                    <i class="fab fa-linkedin"></i>
                </a>

                <a href="https://instagram.com/" target="_blank" title="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>

                <a href="https://www.facebook.com/profile.php?id=100057139187885&locale=el_GR" target="_blank" title="Facebook">
                    <i class="fab fa-facebook"></i>
                </a>
            </fieldset>
        </div>
    </section>
</body>
</html>
