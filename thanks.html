<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank you!</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="img/fashion-svgrepo-com.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f7e3ec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .thanks-box {
            text-align: center;
            font-family: "Playfair Display", serif;
            color: #c77d9c;
            padding: 40px;
            border: 2px solid #c77d9c;
            border-radius: 18px;
            background: rgba(247, 227, 236, 0.92);
            margin: 20px;
        }
        .thanks-box h1 { font-size: 2rem; margin-bottom: 10px; }
        .thanks-box p { font-size: 1.1rem; margin-bottom: 20px; line-height: 1.6; }
        .thanks-box a { color: #c77d9c; text-decoration: underline; font-size: 1rem; }
        .thanks-box a:hover { color: #8a4a68; }

        @media (max-width: 768px) {
            .thanks-box h1 { font-size: 2.2rem; }
            .thanks-box p { font-size: 1.4rem; }
            .thanks-box a { font-size: 1.1rem; }
        }
        .star {
            display: inline-block;
            animation: starSpin 2s ease-in-out infinite;
        }

        @keyframes starSpin {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(20deg) scale(1.3); }
            75% { transform: rotate(-20deg) scale(1.3); }
        }
    </style>
</head>
<body>
<div class="thanks-box">
    <h1>Thank you! <span class="star">✨</span></h1>
    <p>Your message has been received.<br>I will get back to you soon!</p>
    <a href="index.html">← Back to Portfolio</a>
</div>
</body>
</html>
